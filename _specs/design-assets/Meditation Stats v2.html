<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meditation Stats</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1209;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

// ── Mock Data ──────────────────────────────────────────────
const STREAK_CURRENT = 14;
const STREAK_LONGEST = 31;
const TOTAL_SESSIONS = 87;

const TAB_OPTIONS = [
  { label: "Days",     value: "days" },
  { label: "Weeks",    value: "weeks" },
  { label: "Months",   value: "months" },
  { label: "All Time", value: "all" },
];

// Days: last 14 days, labeled by day-of-week abbreviation
const DAYS_DATA = [
  { label: "S", mins: 35 }, { label: "D", mins: 55 }, { label: "L", mins: 50 },
  { label: "M", mins: 60 }, { label: "M", mins: 58 }, { label: "J", mins: 52 },
  { label: "V", mins: 48 }, { label: "S", mins: 0  }, { label: "D", mins: 0  },
  { label: "L", mins: 15 }, { label: "M", mins: 0  }, { label: "M", mins: 0  },
  { label: "J", mins: 0  }, { label: "V", mins: 0  },
];

// Weeks: last 14 weeks
const WEEKS_DATA = [
  { label: "15",  mins: 180 }, { label: "22",  mins: 210 }, { label: "Mar", mins: 150 },
  { label: "8",   mins: 170 }, { label: "15",  mins: 140 }, { label: "22",  mins: 120 },
  { label: "29",  mins: 60  }, { label: "Abr", mins: 0   }, { label: "12",  mins: 350 },
  { label: "19",  mins: 380 }, { label: "26",  mins: 360 }, { label: "May", mins: 320 },
  { label: "12",  mins: 280 }, { label: "19",  mins: 21  },
];

// Months: last 12 months
const MONTHS_DATA = [
  { label: "Jun", mins: 120  }, { label: "Jul", mins: 2100 }, { label: "Aug", mins: 2500 },
  { label: "Sep", mins: 2200 }, { label: "Oct", mins: 1900 }, { label: "Nov", mins: 1500 },
  { label: "Dec", mins: 800  }, { label: "Jan", mins: 700  }, { label: "Feb", mins: 600  },
  { label: "Mar", mins: 650  }, { label: "Apr", mins: 900  }, { label: "May", mins: 83   },
];

// All time: cumulative data points for area chart
const ALL_TIME_DATA = [
  { label: "2023", cumulative: 2000  },
  { label: "",     cumulative: 5000  },
  { label: "",     cumulative: 9000  },
  { label: "2024", cumulative: 14000 },
  { label: "",     cumulative: 20000 },
  { label: "",     cumulative: 28000 },
  { label: "2025", cumulative: 35000 },
  { label: "",     cumulative: 42000 },
  { label: "",     cumulative: 50000 },
  { label: "2026", cumulative: 56000 },
  { label: "",     cumulative: 62000 },
  { label: "",     cumulative: 65632 },
];

const ALL_BAR_DATA = {
  days:   DAYS_DATA,
  weeks:  WEEKS_DATA,
  months: MONTHS_DATA,
  all:    ALL_TIME_DATA,
};

function formatMins(m) {
  if (m < 60) return m + " min";
  const h = Math.floor(m / 60);
  const r = m % 60;
  return r > 0 ? h + "h " + r + " m" : h + "h";
}

const CHART_TITLES = {
  days:   "Time per Day",
  weeks:  "Time per Week",
  months: "Time per Month",
  all:    "All Time",
};

const CURRENT_LABELS = {
  days:   "today",
  weeks:  "this week",
  months: "this month",
};

const SESSIONS = [
  { id: 1,  date: "Apr 26, 2026", time: "7:02 AM",  duration: "12 min", type: "Morning Calm" },
  { id: 2,  date: "Apr 25, 2026", time: "6:48 AM",  duration: "28 min", type: "Deep Focus" },
  { id: 3,  date: "Apr 24, 2026", time: "9:15 PM",  duration: "22 min", type: "Sleep Prep" },
  { id: 4,  date: "Apr 23, 2026", time: "7:30 AM",  duration: "15 min", type: "Morning Calm" },
  { id: 5,  date: "Apr 22, 2026", time: "6:00 AM",  duration: "40 min", type: "Body Scan" },
  { id: 6,  date: "Apr 21, 2026", time: "8:20 AM",  duration: "20 min", type: "Breathwork" },
  { id: 7,  date: "Apr 20, 2026", time: "7:10 AM",  duration: "35 min", type: "Deep Focus" },
  { id: 8,  date: "Apr 19, 2026", time: "9:00 PM",  duration: "18 min", type: "Sleep Prep" },
  { id: 9,  date: "Apr 17, 2026", time: "7:55 AM",  duration: "25 min", type: "Morning Calm" },
  { id: 10, date: "Apr 16, 2026", time: "6:30 AM",  duration: "30 min", type: "Body Scan" },
];

const CHART_H = 120;

function calcChartVars(data) {
  const nonZero = data.filter(d => d.mins > 0);
  const avg = nonZero.length ? Math.round(nonZero.reduce((s, d) => s + d.mins, 0) / nonZero.length) : 0;
  const maxMins = Math.max(...data.map(d => d.mins), 1);
  return { avg, maxMins };
}

// ── Colors ─────────────────────────────────────────────────
const C = {
  bg:        "#F5E6D3",
  card:      "#EDD9C0",
  tan:       "#C8A96E",
  brown:     "#A0654A",
  terracotta:"#E8936A",
  gold:      "#D4B856",
  text:      "#6B4226",
  muted:     "#B8956A",
};

// ── Stat Card ──────────────────────────────────────────────
function StatCard({ value, label, icon }) {
  return (
    <div style={{
      flex: 1,
      background: C.tan,
      borderRadius: 16,
      padding: "14px 10px",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      gap: 4,
    }}>
      <span style={{ fontSize: 11, color: C.brown, opacity: 0.7 }}>{icon}</span>
      <span style={{ fontSize: 26, fontWeight: 800, color: C.brown, lineHeight: 1.1 }}>{value}</span>
      <span style={{ fontSize: 10, color: C.brown, opacity: 0.75, textAlign: "center", lineHeight: 1.3 }}>{label}</span>
    </div>
  );
}

// ── Bar Chart (SVG) ────────────────────────────────────────
function BarChart({ data }) {
  const { avg, maxMins } = calcChartVars(data);
  const n = data.length;
  const gap = 6;
  const vbW = 300;
  const barW = (vbW - gap * (n - 1)) / n;
  const avgY = CHART_H - (avg / maxMins) * CHART_H;

  return (
    <div style={{ paddingBottom: 4 }}>
      <svg viewBox={`0 0 ${vbW} ${CHART_H + 28}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
        <line x1={0} y1={avgY} x2={vbW} y2={avgY}
          stroke={C.gold} strokeWidth={1} strokeDasharray="4 3" />
        {data.map((d, i) => {
          const barH = d.mins === 0 ? 3 : (d.mins / maxMins) * CHART_H;
          const x = i * (barW + gap);
          const y = CHART_H - barH;
          const isLast = i === data.length - 1;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={barH} rx={3}
                fill={isLast ? C.brown : C.terracotta}
                opacity={d.mins === 0 ? 0.25 : 1} />
              <text x={x + barW / 2} y={CHART_H + 14} textAnchor="middle"
                fontSize={7} fill={C.muted}>{d.label}</text>
            </g>
          );
        })}
        <text x={vbW - 2} y={avgY - 3} textAnchor="end" fontSize={7} fill={C.gold} fontWeight="700">
          avg {formatMins(avg)}
        </text>
      </svg>
    </div>
  );
}

// ── Area Chart (SVG) for All Time ──────────────────────────
function AreaChart({ data }) {
  const maxVal = Math.max(...data.map(d => d.cumulative), 1);
  const AREA_H = 130;
  const AREA_W = 300;
  const stepX = AREA_W / (data.length - 1);

  const points = data.map((d, i) => {
    const x = i * stepX;
    const y = AREA_H - (d.cumulative / maxVal) * (AREA_H - 10);
    return { x, y };
  });

  const linePath = points.map((p, i) => (i === 0 ? `M${p.x},${p.y}` : `L${p.x},${p.y}`)).join(" ");
  const areaPath = linePath + ` L${points[points.length-1].x},${AREA_H} L${points[0].x},${AREA_H} Z`;

  const totalMins = data[data.length - 1].cumulative;

  return (
    <div>
      <svg viewBox={`0 0 ${AREA_W} ${AREA_H + 24}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.terracotta} stopOpacity="0.5" />
            <stop offset="100%" stopColor={C.terracotta} stopOpacity="0.05" />
          </linearGradient>
        </defs>
        <path d={areaPath} fill="url(#areaGrad)" />
        <path d={linePath} fill="none" stroke={C.terracotta} strokeWidth="2" />
        {data.map((d, i) => (
          d.label ? (
            <text key={i} x={i * stepX} y={AREA_H + 16} textAnchor="middle"
              fontSize={7.5} fill={C.muted}>{d.label}</text>
          ) : null
        ))}
      </svg>
    </div>
  );
}

// ── Tab Navigation ─────────────────────────────────────────
function TabNav({ value, onChange }) {
  return (
    <div style={{
      display: "flex",
      gap: 0,
      borderBottom: `1.5px solid ${C.tan}`,
      marginBottom: 0,
    }}>
      {TAB_OPTIONS.map(opt => {
        const active = opt.value === value;
        return (
          <button key={opt.value}
            onClick={() => onChange(opt.value)}
            style={{
              flex: 1,
              background: "none",
              border: "none",
              borderBottom: active ? `2.5px solid ${C.brown}` : "2.5px solid transparent",
              padding: "10px 4px 8px",
              cursor: "pointer",
              fontSize: 11,
              fontWeight: active ? 700 : 400,
              color: active ? C.text : C.muted,
              marginBottom: -1.5,
              transition: "all 0.15s ease",
              fontFamily: "inherit",
            }}
          >
            {opt.label}
          </button>
        );
      })}
    </div>
  );
}

// ── Session Row ────────────────────────────────────────────
function SessionRow({ session }) {
  return (
    <div style={{
      background: C.card,
      borderRadius: 12,

      padding: "10px 12px",
      display: "flex",
      alignItems: "center",
      gap: 10,
      marginBottom: 8,
    }}>
      {/* Clock icon (SVG stand-in) */}
      <div style={{
        width: 32, height: 32,
        borderRadius: "50%",
        background: C.tan,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        flexShrink: 0,
      }}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6.5" stroke={C.brown} strokeWidth="1.5"/>
          <line x1="8" y1="4.5" x2="8" y2="8.2" stroke={C.brown} strokeWidth="1.5" strokeLinecap="round"/>
          <line x1="8" y1="8.2" x2="10.5" y2="10" stroke={C.brown} strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 2 }}>{session.type}</div>
        <div style={{ fontSize: 10, color: C.muted }}>{session.date} · {session.time}</div>
      </div>
      <div style={{
        background: C.bg,
        borderRadius: 8,
        padding: "4px 8px",
        fontSize: 11,
        fontWeight: 700,
        color: C.brown,
        flexShrink: 0,
      }}>
        {session.duration}
      </div>
    </div>
  );
}

// ── Main Screen ────────────────────────────────────────────
function MeditationStats() {
  const [tab, setTab] = useState("days");
  const chartData = ALL_BAR_DATA[tab];
  const isAllTime = tab === "all";

  // Compute current period value and average for bar charts
  const currentVal = !isAllTime ? chartData[chartData.length - 1].mins : 0;
  const nonZero = !isAllTime ? chartData.filter(d => d.mins > 0) : [];
  const avg = nonZero.length ? Math.round(nonZero.reduce((s, d) => s + d.mins, 0) / nonZero.length) : 0;
  const totalAllTime = isAllTime ? chartData[chartData.length - 1].cumulative : 0;

  return (
    <div style={{
      background: C.bg,
      height: "100%",
      overflowY: "auto",
      padding: "16px 16px 32px",
    }}>
      {/* Back arrow */}
      <div style={{ marginBottom: 20, display: "flex", alignItems: "center" }}>
        <button style={{
          background: "none",
          border: "none",
          cursor: "pointer",
          padding: 4,
          display: "flex",
          alignItems: "center",
          gap: 6,
          color: C.brown,
        }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M13 4L7 10L13 16" stroke={C.brown} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
        <span style={{ fontSize: 18, fontWeight: 800, color: C.text, marginLeft: 4 }}>My Statistics</span>
      </div>

      {/* Stat cards */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <StatCard value={STREAK_CURRENT} label={"Current\nStreak"} icon="🌿" />
        <StatCard value={STREAK_LONGEST} label={"Longest\nStreak"} icon="🏆" />
        <StatCard value={TOTAL_SESSIONS} label={"Total\nSessions"} icon="🧘" />
      </div>

      {/* Tab navigation */}
      <TabNav value={tab} onChange={setTab} />

      {/* Chart section */}
      <div style={{
        background: C.card,
        borderRadius: 16,
        padding: "14px 12px 10px",
        marginTop: 16,
        marginBottom: 20,
      }}>
        {/* Chart header */}
        <div style={{ marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.text, display: "block", marginBottom: 2 }}>
            {CHART_TITLES[tab]}
          </span>
          {!isAllTime ? (
            <>
              <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>
                {formatMins(currentVal)} {CURRENT_LABELS[tab]}
              </span>
              <span style={{ fontSize: 10, color: C.muted, marginLeft: 8 }}>
                Avg: {formatMins(avg)}
              </span>
            </>
          ) : (
            <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>
              Total: {formatMins(totalAllTime)}
            </span>
          )}
        </div>

        {/* Chart */}
        {isAllTime ? (
          <AreaChart data={chartData} />
        ) : (
          <BarChart data={chartData} />
        )}

        {/* Legend */}
        <div style={{ display: "flex", gap: 14, marginTop: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <div style={{ width: 10, height: 10, borderRadius: 3, background: C.terracotta }}></div>
            <span style={{ fontSize: 9.5, color: C.muted }}>
              {isAllTime ? "Cumulative" : "Session"}
            </span>
          </div>
          {!isAllTime && (
            <>
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 14, height: 2, background: C.gold, borderRadius: 1 }}></div>
                <span style={{ fontSize: 9.5, color: C.muted }}>Avg ({formatMins(avg)})</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: C.brown }}></div>
                <span style={{ fontSize: 9.5, color: C.muted }}>Current</span>
              </div>
            </>
          )}
        </div>
      </div>

      {/* Session list */}
      <div style={{ marginBottom: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>Past Sessions</span>
          <span style={{ fontSize: 10, color: C.muted }}>{SESSIONS.length} recent</span>
        </div>
        {SESSIONS.map(s => <SessionRow key={s.id} session={s} />)}
      </div>
    </div>
  );
}

// ── Root ───────────────────────────────────────────────────
function App() {
  return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh" }}>
      <AndroidDevice statusBarDark={true}>
        <MeditationStats />
      </AndroidDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
