<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jhanna Timer</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1410; display: flex; align-items: center; justify-content: center; font-family: -apple-system, Helvetica, sans-serif; }
    #root { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

    @keyframes bellRing {
      0%   { transform: scale(1) rotate(0deg); }
      15%  { transform: scale(1.45) rotate(-15deg); }
      30%  { transform: scale(1.45) rotate(15deg); }
      45%  { transform: scale(1.45) rotate(-10deg); }
      60%  { transform: scale(1.45) rotate(10deg); }
      75%  { transform: scale(1.3) rotate(0deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes fadePhase {
      0%   { opacity: 0; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1; }
    }
    .bell-ring { animation: bellRing 0.7s ease forwards; }
    .phase-fade { animation: fadePhase 0.5s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── constants ──────────────────────────────────────────────
const COLORS = {
  bg:         '#F5E6D3',
  cream:      '#A0654A',
  gold:       '#D4B856',
  goldDim:    '#c9a84c',
  terracotta: '#E8936A',
  coral:      '#D4796A',
  overlay:    'rgba(160,101,74,0.55)',
};

const PHASES = [
  { label: 'Preparation', duration: 30 },
  { label: 'Meditation',  duration: 300 },
];

// ── SVG circular timer ────────────────────────────────────
function CircleTimer({ progress, timeLabel }) {
  const R = 108;
  const CX = 130;
  const CY = 130;
  const circumference = 2 * Math.PI * R;
  const dash = circumference * progress;
  const gap  = circumference - dash;

  return (
    <svg width="260" height="260" style={{ display: 'block' }}>
      {/* track */}
      <circle
        cx={CX} cy={CY} r={R}
        fill="none"
        stroke={COLORS.goldDim}
        strokeWidth="6"
        opacity="0.35"
      />
      {/* progress arc */}
      <circle
        cx={CX} cy={CY} r={R}
        fill="none"
        stroke={COLORS.gold}
        strokeWidth="6"
        strokeLinecap="round"
        strokeDasharray={`${dash} ${gap}`}
        strokeDashoffset={circumference * 0.25} /* start at top */
        style={{ transition: 'stroke-dasharray 0.9s linear' }}
      />
      {/* inner soft glow ring */}
      <circle
        cx={CX} cy={CY} r={R - 14}
        fill="none"
        stroke={COLORS.gold}
        strokeWidth="1"
        opacity="0.12"
      />
      {/* time text */}
      <text
        x={CX} y={CY - 10}
        textAnchor="middle"
        dominantBaseline="middle"
        fill={COLORS.cream}
        fontSize="46"
        fontFamily="-apple-system, Helvetica Neue, sans-serif"
        fontWeight="200"
        letterSpacing="3"
      >
        {timeLabel}
      </text>
      {/* sub label */}
      <text
        x={CX} y={CY + 34}
        textAnchor="middle"
        dominantBaseline="middle"
        fill={COLORS.cream}
        fontSize="11"
        fontFamily="-apple-system, Helvetica Neue, sans-serif"
        fontWeight="300"
        opacity="0.55"
        letterSpacing="4"
      >
        REMAINING
      </text>
    </svg>
  );
}

// ── bell icon (pure SVG, no dep needed) ──────────────────
function BellIcon({ ringing }) {
  return (
    <span
      className={ringing ? 'bell-ring' : ''}
      style={{ display: 'inline-block', lineHeight: 1 }}
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path
          d="M12 2a7 7 0 0 0-7 7v3.17L3.29 14H20.7L19 12.17V9a7 7 0 0 0-7-7Z"
          fill={COLORS.cream} opacity="0.85"
        />
        <path
          d="M10 17a2 2 0 0 0 4 0"
          stroke={COLORS.cream} strokeWidth="1.5" strokeLinecap="round"
          fill="none" opacity="0.85"
        />
      </svg>
    </span>
  );
}

// ── main screen ───────────────────────────────────────────
function MeditationScreen() {
  const [phaseIdx,    setPhaseIdx]    = useState(0);
  const [remaining,   setRemaining]   = useState(PHASES[0].duration);
  const [running,     setRunning]     = useState(true);
  const [ringing,     setRinging]     = useState(false);
  const [phaseKey,    setPhaseKey]    = useState(0); // for re-trigger fade anim

  const intervalRef = useRef(null);
  const phase = PHASES[phaseIdx];

  const ringBell = useCallback(() => {
    setRinging(true);
    setTimeout(() => setRinging(false), 750);
  }, []);

  const advancePhase = useCallback(() => {
    const next = phaseIdx + 1;
    if (next < PHASES.length) {
      ringBell();
      setPhaseIdx(next);
      setRemaining(PHASES[next].duration);
      setPhaseKey(k => k + 1);
    } else {
      // session complete
      ringBell();
      setRunning(false);
    }
  }, [phaseIdx, ringBell]);

  useEffect(() => {
    if (!running) { clearInterval(intervalRef.current); return; }
    intervalRef.current = setInterval(() => {
      setRemaining(r => {
        if (r <= 1) { advancePhase(); return 0; }
        return r - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [running, advancePhase]);

  // format
  const mins = String(Math.floor(remaining / 60)).padStart(2, '0');
  const secs = String(remaining % 60).padStart(2, '0');
  const timeLabel = `${mins}:${secs}`;
  const progress  = remaining / phase.duration;

  const handlePause = () => setRunning(r => !r);
  const handleStop  = () => { setRunning(false); setRemaining(phase.duration); };

  return (
    <div style={{
      flex: 1,
      width: '100%',
      height: '100%',
      background: COLORS.bg,
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      gap: 0,
      userSelect: 'none',
    }}>

      {/* ── phase label + bell ── */}
      <div
        key={phaseKey}
        className="phase-fade"
        style={{
          display: 'flex',
          alignItems: 'center',
          gap: 8,
          marginBottom: 36,
        }}
      >
        <BellIcon ringing={ringing} />
        <span style={{
          color: COLORS.cream,
          fontSize: 13,
          fontWeight: 300,
          letterSpacing: '0.22em',
          textTransform: 'uppercase',
          opacity: 0.82,
        }}>
          {phase.label}
        </span>
      </div>

      {/* ── circular timer ── */}
      <div style={{ position: 'relative' }}>
        {/* ambient glow */}
        <div style={{
          position: 'absolute',
          inset: '-20px',
          borderRadius: '50%',
          background: `radial-gradient(circle, ${COLORS.gold}18 0%, transparent 70%)`,
          pointerEvents: 'none',
        }} />
        <CircleTimer progress={progress} timeLabel={timeLabel} />
      </div>

      {/* ── phase dots ── */}
      <div style={{ display: 'flex', gap: 6, marginTop: 28 }}>
        {PHASES.map((_, i) => (
          <div key={i} style={{
            width:  i === phaseIdx ? 18 : 6,
            height: 6,
            borderRadius: 3,
            background: i === phaseIdx ? COLORS.gold : COLORS.cream,
            opacity: i === phaseIdx ? 0.9 : 0.25,
            transition: 'all 0.4s ease',
          }} />
        ))}
      </div>

      {/* ── pause indicator ── */}
      {!running && (
        <span style={{
          marginTop: 18,
          color: COLORS.cream,
          fontSize: 10,
          letterSpacing: '0.3em',
          textTransform: 'uppercase',
          opacity: 0.5,
          animation: 'pulse 2s ease-in-out infinite',
        }}>
          paused
        </span>
      )}
      {running && <div style={{ marginTop: 18, height: 14 }} />}

      {/* ── buttons ── */}
      <div style={{
        position: 'absolute',
        bottom: 52,
        display: 'flex',
        gap: 14,
      }}>
        <button
          onClick={handlePause}
          style={{
            background: COLORS.terracotta,
            color: COLORS.cream,
            border: 'none',
            borderRadius: 28,
            padding: '14px 34px',
            fontSize: 14,
            fontWeight: 500,
            letterSpacing: '0.05em',
            cursor: 'pointer',
            boxShadow: `0 4px 20px ${COLORS.terracotta}55`,
            transition: 'opacity 0.15s, transform 0.1s',
          }}
          onMouseDown={e => e.currentTarget.style.transform = 'scale(0.95)'}
          onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
          onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
        >
          {running ? 'Pause' : 'Resume'}
        </button>
        <button
          onClick={handleStop}
          style={{
            background: COLORS.coral,
            color: COLORS.cream,
            border: 'none',
            borderRadius: 28,
            padding: '14px 34px',
            fontSize: 14,
            fontWeight: 500,
            letterSpacing: '0.05em',
            cursor: 'pointer',
            boxShadow: `0 4px 20px ${COLORS.coral}44`,
            transition: 'opacity 0.15s, transform 0.1s',
          }}
          onMouseDown={e => e.currentTarget.style.transform = 'scale(0.95)'}
          onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
          onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
        >
          Stop
        </button>
      </div>
    </div>
  );
}

// ── app shell ─────────────────────────────────────────────
function App() {
  return (
    <IOSDevice statusBarStyle="light">
      <MeditationScreen />
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
