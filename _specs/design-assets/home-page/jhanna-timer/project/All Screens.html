<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jhanna Timer — All Screens</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { background: #141210; }

    .screen-frame {
      width: 390px;
      height: 844px;
      border: none;
      border-radius: 0;
      display: block;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas defaultZoom={0.7}>
      <DCSection id="flows" title="Screens">
        <DCArtboard id="home" label="Home" width={390} height={844}>
          <iframe className="screen-frame" src="home-page.html"></iframe>
        </DCArtboard>
        <DCArtboard id="timer" label="Timer" width={390} height={844}>
          <iframe className="screen-frame" src="Jhanna Timer.html"></iframe>
        </DCArtboard>
        <DCArtboard id="session" label="Session Complete" width={390} height={844}>
          <iframe className="screen-frame" src="session-finished-page.html"></iframe>
        </DCArtboard>
        <DCArtboard id="stats" label="Meditation Stats" width={390} height={844}>
          <iframe className="screen-frame" src="Meditation Stats.html"></iframe>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
