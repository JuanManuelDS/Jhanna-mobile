<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Complete</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      width: 100%; height: 100%;
      background: #F5E6D3;
      font-family: 'DM Sans', sans-serif;
    }
    /* Phone shell for RN-style preview */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #EDD9C0;
    }
    .phone-shell {
      width: 390px;
      height: 844px;
      background: #F5E6D3;
      border-radius: 48px;
      box-shadow:
        0 0 0 10px #2a1f17,
        0 0 0 12px #3d2e23,
        0 32px 80px rgba(0,0,0,0.35);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    /* Status bar */
    .status-bar {
      height: 50px;
      background: #F5E6D3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px 0;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #6B4A35;
      letter-spacing: -0.3px;
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-icons svg { color: #6B4A35; }
    /* Dynamic island */
    .dynamic-island {
      width: 126px;
      height: 36px;
      background: #1a1008;
      border-radius: 20px;
      margin: 0 auto;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Lotus SVG icon — simple, meditative
    function LotusIcon({ size = 64, color = '#E8936A' }) {
      return (
        <svg width={size} height={size} viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          {/* Center petal */}
          <path d="M32 42 C32 42 22 32 22 22 C22 14 27 10 32 10 C37 10 42 14 42 22 C42 32 32 42 32 42Z" fill={color} opacity="0.9"/>
          {/* Left petal */}
          <path d="M32 42 C32 42 14 36 10 26 C7 18 10 12 15 10 C20 8 26 12 28 20 C30 28 32 42 32 42Z" fill={color} opacity="0.65"/>
          {/* Right petal */}
          <path d="M32 42 C32 42 50 36 54 26 C57 18 54 12 49 10 C44 8 38 12 36 20 C34 28 32 42 32 42Z" fill={color} opacity="0.65"/>
          {/* Far left petal */}
          <path d="M32 42 C32 42 10 42 6 34 C3 27 6 20 12 18 C18 16 24 20 26 28 C28 34 32 42 32 42Z" fill={color} opacity="0.4"/>
          {/* Far right petal */}
          <path d="M32 42 C32 42 54 42 58 34 C61 27 58 20 52 18 C46 16 40 20 38 28 C36 34 32 42 32 42Z" fill={color} opacity="0.4"/>
          {/* Stem/base */}
          <path d="M26 44 Q32 50 38 44" stroke={color} strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7"/>
          {/* Center circle */}
          <circle cx="32" cy="24" r="4" fill="#F5E6D3" opacity="0.7"/>
        </svg>
      );
    }

    // Divider line
    function Divider() {
      return (
        <div style={{
          width: '100%',
          height: 1,
          background: 'rgba(160,101,74,0.18)',
          margin: '4px 0',
        }} />
      );
    }

    // Stat row inside card
    function StatRow({ label, value, icon }) {
      return (
        <div style={{
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          paddingTop: 12,
          paddingBottom: 12,
        }}>
          <span style={{
            fontSize: 13,
            fontWeight: 500,
            color: '#A0654A',
            opacity: 0.7,
            letterSpacing: '0.06em',
            textTransform: 'uppercase',
          }}>{label}</span>
          <span style={{
            fontSize: 15,
            fontWeight: 600,
            color: '#6B4A35',
            display: 'flex',
            alignItems: 'center',
            gap: 5,
          }}>
            {icon && <span style={{ fontSize: 16 }}>{icon}</span>}
            {value}
          </span>
        </div>
      );
    }

    // Button
    function Button({ label, filled, onPress }) {
      const [pressed, setPressed] = useState(false);
      return (
        <button
          onMouseDown={() => setPressed(true)}
          onMouseUp={() => setPressed(false)}
          onMouseLeave={() => setPressed(false)}
          onClick={onPress}
          style={{
            width: '100%',
            height: 54,
            borderRadius: 16,
            border: filled ? 'none' : '1.5px solid #A0654A',
            background: filled
              ? pressed ? '#d97f58' : '#E8936A'
              : pressed ? 'rgba(160,101,74,0.07)' : 'transparent',
            color: filled ? '#FDF4EC' : '#A0654A',
            fontSize: 16,
            fontWeight: 600,
            fontFamily: "'DM Sans', sans-serif",
            letterSpacing: '0.01em',
            cursor: 'pointer',
            transition: 'background 0.15s ease, transform 0.1s ease',
            transform: pressed ? 'scale(0.98)' : 'scale(1)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: 8,
          }}
        >
          {label}
        </button>
      );
    }

    function SessionFinishedPage() {
      // Props you'd receive from navigation in real RN
      const duration = 10; // minutes
      const streakCount = 12;
      const today = new Date(2026, 3, 26); // April 26, 2026

      const formattedDate = today.toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric'
      });
      const formattedDuration = `${duration} min`;

      return (
        <div style={{
          width: 390,
          height: 844,
          background: '#F5E6D3',
          borderRadius: 36,
          overflow: 'hidden',
          display: 'flex',
          flexDirection: 'column',
          position: 'relative',
          boxShadow:
            '0 0 0 8px #1c1c1e, 0 0 0 10px #2e2e30, 0 32px 80px rgba(0,0,0,0.35)',
        }}>
          {/* Status bar */}
          <div style={{
            height: 50,
            background: '#F5E6D3',
            display: 'flex',
            alignItems: 'flex-start',
            justifyContent: 'space-between',
            padding: '16px 28px 0',
            flexShrink: 0,
            position: 'relative',
          }}>
            <span style={{ fontSize: 15, fontWeight: 600, color: '#6B4A35', letterSpacing: -0.3 }}>9:41</span>
            {/* Android punch-hole camera */}
            <div style={{
              position: 'absolute',
              top: 14, left: '50%',
              transform: 'translateX(-50%)',
              width: 12, height: 12,
              background: '#1a1008',
              borderRadius: '50%',
            }} />
            <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
              {/* Signal */}
              <svg width="17" height="12" viewBox="0 0 17 12" fill="#6B4A35">
                <rect x="0" y="7" width="3" height="5" rx="0.5"/>
                <rect x="4.5" y="4.5" width="3" height="7.5" rx="0.5"/>
                <rect x="9" y="2" width="3" height="10" rx="0.5"/>
                <rect x="13.5" y="0" width="3" height="12" rx="0.5"/>
              </svg>
              {/* Wifi */}
              <svg width="16" height="12" viewBox="0 0 16 12" fill="#6B4A35">
                <path d="M8 9.5 C8 9.5 8 9.5 8 9.5" stroke="#6B4A35" strokeWidth="2" strokeLinecap="round"/>
                <path d="M5.5 7 Q8 5 10.5 7" stroke="#6B4A35" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
                <path d="M3 4.5 Q8 1 13 4.5" stroke="#6B4A35" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
              </svg>
              {/* Battery */}
              <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
                <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#6B4A35" strokeWidth="1"/>
                <rect x="2" y="2" width="16" height="8" rx="2" fill="#6B4A35"/>
                <path d="M22.5 4 C23.5 4 24 4.8 24 6 C24 7.2 23.5 8 22.5 8" stroke="#6B4A35" strokeWidth="1" strokeLinecap="round"/>
              </svg>
            </div>
          </div>

          {/* Main content — centered */}
          <div style={{
            flex: 1,
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'center',
            justifyContent: 'center',
            padding: '0 24px 16px',
            gap: 20,
          }}>

            {/* Card */}
            <div style={{
              width: '100%',
              background: '#C8A96E',
              borderRadius: 24,
              padding: '32px 28px 28px',
              boxShadow: '0 8px 32px rgba(120,70,30,0.18), 0 2px 8px rgba(120,70,30,0.10)',
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              gap: 0,
            }}>

              {/* Icon */}
              <div style={{ marginBottom: 18 }}>
                <LotusIcon size={68} color="#E8936A" />
              </div>

              {/* Title */}
              <h1 style={{
                fontFamily: "'DM Serif Display', serif",
                fontSize: 28,
                fontWeight: 400,
                color: '#A0654A',
                letterSpacing: '-0.3px',
                textAlign: 'center',
                lineHeight: 1.2,
                marginBottom: 24,
              }}>
                Session Complete
              </h1>

              {/* Stats */}
              <div style={{ width: '100%' }}>
                <Divider />
                <StatRow label="Duration" value={formattedDuration} />
                <Divider />
                <StatRow label="Date" value={formattedDate} />
                <Divider />
                <StatRow label="Streak" value={`${streakCount} consecutive days`} />
                <Divider />
              </div>
            </div>

            {/* Buttons */}
            <div style={{
              width: '100%',
              display: 'flex',
              flexDirection: 'column',
              gap: 12,
            }}>
              <Button label="Return Home" filled={true} onPress={() => {}} />
              <Button label="View Statistics" filled={false} onPress={() => {}} />
            </div>

          </div>

          {/* Android nav bar */}
          <div style={{
            height: 36,
            background: '#F5E6D3',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: 28,
            flexShrink: 0,
            paddingBottom: 4,
          }}>
            {/* Back chevron */}
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M11 4L6 9L11 14" stroke="#A0654A" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            {/* Home pill */}
            <div style={{ width: 36, height: 5, background: '#A0654A', borderRadius: 3, opacity: 0.7 }} />
            {/* Recents square */}
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="3" y="5" width="9" height="9" rx="2" stroke="#A0654A" strokeWidth="1.8"/>
              <rect x="6" y="3" width="9" height="9" rx="2" stroke="#A0654A" strokeWidth="1.8" opacity="0.45"/>
            </svg>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <div style={{
        minHeight: '100vh',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        background: '#EDD9C0',
      }}>
        <SessionFinishedPage />
      </div>
    );
  </script>
</body>
</html>
